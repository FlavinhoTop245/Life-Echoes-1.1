<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Echoes | A Mata Atlântica Pede Socorro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <canvas id="game-canvas"></canvas>

    <div id="ui-container">

        <!-- Cinematic Intro Sequence -->
        <div id="intro-sequence">
            <div id="intro-content">
                <div class="intro-step" id="intro-ggj">
                    <p class="intro-text">A game made for<br>Global Game Jam Next 2026</p>
                </div>
                <div class="intro-step" id="intro-fecap">
                    <p class="intro-text">With support of <img src="assets/logoFECAP.svg" class="intro-logo" alt="FECAP"></p>
                </div>
                <div class="intro-step" id="intro-studio">
                    <p class="intro-text"><img src="assets/logoStudio.png" class="intro-logo-big" alt="Studio"> presents</p>
                </div>
            </div>
        </div>

        <!-- Splash / Main Menu -->
        <main id="splash-screen" class="pre-start">
            <div class="menu-content">
                <h1 class="menu-title">LIFE<br>ECHOES</h1>

                <div class="menu-buttons">
                    <button id="start-btn" class="menu-btn">START GAME</button>
                    <button id="options-btn" class="menu-btn">OPTIONS</button>
                    <button id="quit-btn" class="menu-btn">QUIT</button>
                </div>

                <div class="loading-bar-container" id="menu-loading">
                    <div class="loading-outer">
                        <div id="loading-inner"></div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Survival Information Screen -->
        <div id="survival-screen">
            <h2 class="survival-text">You need to survive.<br>Start searching for food.</h2>
        </div>

        <!-- Options Window -->
        <div id="options-menu">
            <div class="options-window">
                <h2 class="options-title">Options</h2>

                <div class="options-container">
                    <div class="keybinds-section">
                        <div class="options-column">
                            <div class="option-item">
                                <span class="option-label">Move Forward</span>
                                <button class="rebind-btn" id="bind-forward">D</button>
                            </div>
                            <div class="option-item">
                                <span class="option-label">Move Backward</span>
                                <button class="rebind-btn" id="bind-backward">A</button>
                            </div>
                        </div>
                        <div class="options-column">
                            <div class="option-item">
                                <span class="option-label">Jump</span>
                                <button class="rebind-btn" id="bind-jump">SPACE</button>
                            </div>
                            <div class="option-item">
                                <span class="option-label">Action</span>
                                <button class="rebind-btn" id="bind-action">E</button>
                            </div>
                        </div>
                    </div>

                    <div class="volumes-section">
                        <div class="slider-item">
                            <div class="slider-header">
                                <span class="option-label">Music Volume</span>
                                <span class="slider-percent" id="music-vol-percent">25%</span>
                            </div>
                            <input type="range" min="0" max="100" value="25" class="vol-slider" id="music-slider">
                        </div>
                        <div class="slider-item">
                            <div class="slider-header">
                                <span class="option-label">Sound Effects</span>
                                <span class="slider-percent" id="sfx-vol-percent">35%</span>
                            </div>
                            <input type="range" min="0" max="100" value="35" class="vol-slider" id="sfx-slider">
                        </div>
                    </div>
                </div>

                <button id="back-to-menu" class="back-btn">Back to Menu</button>
            </div>
        </div>

        <!-- Narrative bar -->
        <div id="narrative-bar">
            <p id="narrative-text"></p>
        </div>

        <!-- Coordinates HUD (Debug) -->
        <div id="coord-hud"
            style="position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); color: #0f0; padding: 10px 15px; font-family: monospace; font-size: 1.2rem; border: 1px solid #0f0; border-radius: 8px; z-index: 1000; pointer-events: none; opacity: 0;">
            X: 0.00 | Z: 0.00
        </div>

        <!-- Hunter Minigame -->
        <div id="minigame-container">
            <div id="minigame-dial">
                <div id="intro-text" style="position: absolute; width: 100%; text-align: center; top: 10px; color: #fff; z-index: 20; font-size: 0.8rem;">PRESS [E]</div>
                <div id="minigame-sector"></div>
                <div id="minigame-needle"></div>
            </div>
            <div id="minigame-counter">
                <div class="counter-dot" id="dot-1"></div>
                <div class="counter-dot" id="dot-2"></div>
                <div class="counter-dot" id="dot-3"></div>
            </div>
        </div>

        <!-- Quit Overlay -->
        <div id="quit-overlay"></div>

    </div>

    <!-- Libs: Three.js & GLTFLoader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script src="game.js"></script>
</body>

</html>
