<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Echoes | A Mata Atlântica Pede Socorro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --clr-forest-light: #6de2a2;
            --clr-forest-dark: #124d2f;
            --clr-golden: #FFBF00;
            --clr-industrial-dark: #0c1a10;
            --clr-text: #f0f0f0;
            --clr-accent: #6de2a2;
            --clr-glass: rgba(12, 26, 16, 0.55);
            --font-main: 'Outfit', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: var(--clr-industrial-dark); font-family: var(--font-main); color: var(--clr-text); }
        
        #game-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #ui-container { position: relative; z-index: 100; width: 100%; height: 100%; pointer-events: none; }
        #ui-container > * { pointer-events: auto; }

        /* ─── SPLASH ─── */
        #splash-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: radial-gradient(ellipse at 50% 60%, rgba(18, 77, 47, 0.45) 0%, rgba(12, 26, 16, 0.98) 70%);
            backdrop-filter: blur(10px);
            z-index: 200;
            transition: opacity 1.2s ease;
        }
        .content { text-align: center; max-width: 580px; padding: 2rem; }
        .badge { background: var(--clr-accent); color: var(--clr-forest-dark); font-size: 0.65rem; font-weight: 800; padding: 4px 14px; border-radius: 50px; margin-bottom: 1.8rem; display: inline-block; letter-spacing: 2px; text-transform: uppercase; }
        h1 { font-size: 4.5rem; font-weight: 800; letter-spacing: -2px; margin-bottom: 0.4rem; line-height: 1; }
        .glitch-text { animation: glitch 600ms infinite alternate; }
        .subtitle { font-weight: 300; font-size: 1rem; color: var(--clr-accent); letter-spacing: 5px; text-transform: uppercase; margin-bottom: 2.4rem; }
        .story-teaser { background: var(--clr-glass); backdrop-filter: blur(20px); padding: 1.6rem 2rem; border-radius: 12px; margin-bottom: 2.4rem; border-left: 2px solid var(--clr-golden); font-weight: 300; line-height: 1.9; font-size: 0.95rem; opacity: 0.9; }
        
        button { padding: 1.1rem 2.6rem; border: none; border-radius: 14px; font-family: var(--font-main); font-weight: 800; cursor: pointer; transition: all 0.35s; letter-spacing: 1px; font-size: 1rem; }
        .main-btn { background: var(--clr-golden); color: var(--clr-industrial-dark); }
        .main-btn:hover { transform: translateY(-3px) scale(1.04); filter: brightness(1.12); box-shadow: 0 8px 30px rgba(255,191,0,0.3); }

        .loading-bar-container { padding: 1.6rem 0 0; opacity: 0.55; }
        .loading-label { font-size: 0.68rem; letter-spacing: 3px; text-transform: uppercase; }
        .loading-outer { height: 2px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; margin-top: 12px; }
        #loading-inner { width: 0%; height: 100%; background: var(--clr-accent); transition: width 0.3s; }

        /* ─── CUTSCENE NARRATIVE TEXT ─── */
        #narrative-bar {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.88));
            padding: 2rem 3rem 2.5rem;
            z-index: 250;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        #narrative-text {
            font-size: 1.05rem; font-weight: 300; line-height: 1.9;
            color: #e8f5e9; letter-spacing: 0.5px;
            text-shadow: 0 1px 8px rgba(0,0,0,0.8);
            max-width: 700px;
        }

        /* ─── END SCREEN (Hidden for now) ─── */
        .hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        @keyframes glitch {
            0%   { text-shadow:  0.04em 0 0 rgba(255,80,80,0.6), -0.04em -0.02em 0 rgba(80,255,120,0.5); }
            100% { text-shadow: -0.03em 0.03em 0 rgba(255,80,80,0.6),  0.03em -0.03em 0 rgba(80,255,120,0.5); }
        }
    </style>

    <!-- Libs: Three.js r128 & GLTFLoader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>
    <canvas id="game-canvas"></canvas>

    <div id="ui-container">

        <!-- Splash -->
        <main id="splash-screen">
            <div class="content">
                <div class="logo-area">
                    <span class="badge">Global Game Jam · Mata Atlântica</span>
                    <h1 class="glitch-text">LIFE ECHOES</h1>
                    <p class="subtitle">O rugido silencioso da Mata Atlântica.</p>
                </div>
                <div class="story-teaser">
                    <p>A floresta está em silêncio. O mico-leão-dourado e sua família dependem de você. Sobreviva. Cuide. Lembre.</p>
                </div>
                <div class="actions">
                    <button id="start-btn" class="main-btn">INICIAR JORNADA</button>
                </div>
                <div class="loading-bar-container">
                    <div class="loading-label" id="loading-text-label">Preparando a floresta…</div>
                    <div class="loading-outer"><div id="loading-inner"></div></div>
                </div>
            </div>
        </main>

        <!-- Narrative bar (cutscene + in-game story moments) -->
        <div id="narrative-bar">
            <p id="narrative-text"></p>
        </div>

    </div>

    <script src="game.js"></script>
</body>
</html>
